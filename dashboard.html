<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🦈 Marketplace Shark</title>
<style>
  :root{
    --bg:#0b0f14; --panel:#131b24; --panel2:#0f161e; --line:#22303c;
    --text:#e6edf3; --dim:#8aa0b2; --accent:#38bdf8;
    --steal:#22c55e; --flip:#84cc16; --deal:#eab308; --invest:#a78bfa; --skip:#64748b;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  header{padding:20px 24px;border-bottom:1px solid var(--line);display:flex;align-items:baseline;gap:16px;flex-wrap:wrap;position:sticky;top:0;background:var(--bg);z-index:5}
  header h1{margin:0;font-size:22px;letter-spacing:.3px}
  header .meta{color:var(--dim);font-size:13px}
  header .stats{margin-left:auto;display:flex;gap:18px;font-size:13px;color:var(--dim)}
  header .stats b{color:var(--text);font-size:16px;display:block}
  .board{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:20px 24px;align-items:start}
  @media(max-width:1000px){.board{grid-template-columns:1fr 1fr}}
  @media(max-width:640px){.board{grid-template-columns:1fr}}
  .col{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px;min-height:80px}
  .col h2{margin:2px 0 12px;font-size:12px;text-transform:uppercase;letter-spacing:1.2px;color:var(--dim);display:flex;justify-content:space-between}
  .col h2 span{background:var(--panel);border-radius:20px;padding:1px 9px;color:var(--text)}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:12px}
  .card:last-child{margin-bottom:0}
  .card .top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
  .card h3{margin:0;font-size:14px;line-height:1.3}
  .card .loc{color:var(--dim);font-size:12px;margin-top:2px}
  .price{font-size:20px;font-weight:700;white-space:nowrap}
  .comp{color:var(--dim);font-size:12px}
  .badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:2px 8px;border-radius:20px;margin-top:8px}
  .b-STEAL{background:var(--steal);color:#04210f}
  .b-FLIP{background:var(--flip);color:#1a2205}
  .b-DEAL{background:var(--deal);color:#231c02}
  .b-INVESTIGATE{background:var(--invest);color:#1c1233}
  .margin{color:var(--steal);font-size:12px;font-weight:600;margin-top:6px}
  .risk{color:#f59e0b;font-size:12px;margin-top:8px}
  .sec{margin-top:10px;border-top:1px dashed var(--line);padding-top:8px}
  .sec .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);margin-bottom:3px}
  .draft{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:8px;font-size:12.5px;color:#cde3f0}
  .mandate{font-size:12px;color:var(--dim)}
  .mandate b{color:var(--text)}
  .notes{font-size:12px;color:var(--dim);margin-top:8px;font-style:italic}
  .empty{color:var(--skip);font-size:12px;text-align:center;padding:14px 0}
  footer{padding:16px 24px;color:var(--dim);font-size:12px;border-top:1px solid var(--line)}
  .pill{display:inline-block;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:2px 10px;font-size:11px;color:var(--dim);margin-right:6px}
</style>
</head>
<body>
<header>
  <h1>🦈 Marketplace Shark</h1>
  <div class="meta" id="meta"></div>
  <div class="stats" id="stats"></div>
</header>
<div class="board" id="board"></div>
<footer>
  Human gate = <b>approve-before-send</b>. I auto-find, score, draft & plan. You green-light first contact; I negotiate to your walk price. ·
  <span class="pill">Regenerated each scan</span>
</footer>

<script>
// ==== DATA (regenerated by the scan; mirrors deals.json) ====
const DATA = {
  "updated": "2026-07-12T15:07:00",
  "market": "Whitefish, MT (100mi) + nationwide ship",
  "deals": [
    {"id":"mizuno-t22-wedges-whitefish","category":"golf-personal","title":"Mizuno T22 Wedges 50° & 54° — Great Condition","location":"Whitefish, MT (LOCAL)","ask":100,"comp":150,"verdict":"DEAL","margin_est":null,"stage":"awaiting-approval","condition_risk":"Confirm shafts/flex + groove wear. Your wedge want.","draft_opener":"Hi! Are the Mizuno T22 wedges (50° & 54°) still available? What shaft + flex, and how are the grooves/faces? I'm local in Whitefish and can pick up with cash. Thanks!","mandate":{"open":85,"target":95,"walk":100},"notes":"PERSONAL. Pair worth ~$140-160 used. $100 = good, local, don't over-haggle."},
    {"id":"mizuno-jpx923-hotmetal-set-ship","category":"golf-personal","title":"Mizuno JPX 923 Hot Metal Iron Set","location":"Ships to you","ask":500,"comp":600,"verdict":"DEAL","margin_est":null,"stage":"awaiting-approval","condition_risk":"Confirm irons (4-PW/5-PW), shaft, flex, RH. FB buyer-protection ship only.","draft_opener":"Hi! Is the Mizuno JPX 923 Hot Metal iron set still available? Which irons are included (4-PW / 5-PW?), what shaft + flex, and is it RH? A few photos of the faces would be great. I'd do FB shipping. Thanks!","mandate":{"open":430,"target":470,"walk":500},"notes":"PERSONAL — your named model, recent (2022), at/below market. Your #1 want."},
    {"id":"pxg-gen5-driver-kalispell","category":"golf-flip","title":"PXG Gen 5 driver, 9°","location":"Kalispell, MT","ask":175,"comp":300,"verdict":"FLIP","margin_est":125,"stage":"awaiting-approval","condition_risk":"Need head/shaft/face photos.","draft_opener":"Hi! Is the PXG Gen 5 driver still available? Could you share the loft, shaft (flex + model), and close-up photos of the face and crown? I'm local, can pick up with cash. Thanks!","mandate":{"open":150,"target":165,"walk":175},"notes":"Already underpriced — grab near ask if condition checks out."},
    {"id":"mizuno-jpx-plus-bag-ship","category":"golf-personal","title":"Mizuno JPX irons + 14-way cart bag","location":"Ships to you","ask":399,"comp":null,"verdict":"INVESTIGATE","margin_est":null,"stage":"found","condition_risk":"JPX generation unknown (919/921/923/925).","draft_opener":"Hi! Which generation are the Mizuno JPX irons (919 / 921 / 923 / 925), and which irons are in the set? Shaft + flex? Trying to see if they fit my bag. Thanks!","mandate":null,"notes":"Recon. If recent gen, $399 with cart bag is strong."},
    {"id":"tm-stealth2plus-driver-ship","category":"golf-flip","title":"TaylorMade Stealth 2 Plus 9° driver","location":"Ships to you","ask":175,"comp":250,"verdict":"FLIP","margin_est":65,"stage":"found","condition_risk":"Check sky marks / face wear. Shipping eats margin.","draft_opener":"Hi! Is the Stealth 2 Plus 9° driver still available? What shaft + flex, and any sky marks or face wear? Would do FB shipping. Thanks!","mandate":{"open":150,"target":160,"walk":185},"notes":"Marginal flip (~$65 before ship)."},
    {"id":"vague-500-golfclubs-kalispell","category":"golf-unknown","title":"\"Golf clubs\" $500 (no detail)","location":"Kalispell, MT","ask":500,"comp":null,"verdict":"INVESTIGATE","margin_est":null,"stage":"found","condition_risk":"No brand/model in title.","draft_opener":"Hi! Saw your golf clubs listing — could you tell me the brands and models (irons, driver, woods) and share a few photos? Thanks!","mandate":null,"notes":"Recon only."}
  ]
};
// ============================================================

const COLS = [
  {key:"found", label:"🔎 Found"},
  {key:"awaiting-approval", label:"✋ Awaiting your OK"},
  {key:"negotiating", label:"💬 Negotiating"},
  {key:"ready-to-buy", label:"✅ Ready to buy"}
];

const meta = document.getElementById('meta');
meta.textContent = `${DATA.market} · updated ${new Date(DATA.updated).toLocaleString()}`;

const board = document.getElementById('board');
const counts = {};
DATA.deals.forEach(d=>counts[d.stage]=(counts[d.stage]||0)+1);

document.getElementById('stats').innerHTML =
  `<div><b>${DATA.deals.length}</b>tracked</div>`+
  `<div><b>${DATA.deals.filter(d=>d.verdict==='FLIP'||d.verdict==='STEAL').length}</b>flips</div>`+
  `<div><b>${counts['awaiting-approval']||0}</b>need you</div>`;

function money(n){return n==null?'—':'$'+n}
function card(d){
  const m = d.mandate ? `<div class="sec"><div class="lbl">Negotiation mandate</div>
     <div class="mandate">open <b>$${d.mandate.open}</b> · target <b>$${d.mandate.target}</b> · walk <b>$${d.mandate.walk}</b></div></div>` : '';
  const margin = d.margin_est!=null ? `<div class="margin">▲ ~$${d.margin_est} flip margin</div>` : '';
  const comp = d.comp!=null ? `<div class="comp">comp ~$${d.comp}</div>` : `<div class="comp">no comp yet</div>`;
  return `<div class="card">
    <div class="top">
      <div><h3>${d.title}</h3><div class="loc">${d.location}</div></div>
      <div style="text-align:right"><div class="price">${money(d.ask)}</div>${comp}</div>
    </div>
    <span class="badge b-${d.verdict}">${d.verdict}</span>
    ${margin}
    ${d.condition_risk?`<div class="risk">⚠ ${d.condition_risk}</div>`:''}
    <div class="sec"><div class="lbl">Draft opener</div><div class="draft">${d.draft_opener}</div></div>
    ${m}
    ${d.notes?`<div class="notes">${d.notes}</div>`:''}
  </div>`;
}

COLS.forEach(c=>{
  const items = DATA.deals.filter(d=>d.stage===c.key);
  const el = document.createElement('div');
  el.className='col';
  el.innerHTML = `<h2>${c.label}<span>${items.length}</span></h2>` +
    (items.length?items.map(card).join(''):'<div class="empty">— empty —</div>');
  board.appendChild(el);
});
</script>
</body>
</html>
